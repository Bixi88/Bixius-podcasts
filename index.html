                </div>
            </div>
        </div>

        <h2 class="section-title" id="lastWatchedTitle" style="display:none;">Ultimo video visto</h2>
        <div id="lastWatchedContainer" class="video-list" style="margin-bottom:20px;"></div>

        <h2 class="section-title">I tuoi canali</h2>
        <div class="channels-slider" id="channelsSlider"></div>

        <h2 class="section-title" id="currentChannelTitle" style="display:none;">Ultimi video pubblicati</h2>

    </div>

    <!-- Settings Panel -->

        <!-- ... (form invariato) ... -->
        <div class="settings-card">
            <h2>Gestione Canali</h2>
            <!-- Inserisci qui il form come prima -->
            <div class="form-group">
                <label>Nome del Canale</label>
                <input type="text" id="inputName" class="form-control" placeholder="Es. Pregianza">
            </div>
            <div class="form-group">
                <label>Piattaforma</label>
                <select id="inputPlatform" class="form-control">
                    <option value="youtube_channel">YouTube</option>
                    <option value="youtube_video">YouTube Video/Playlist</option>
                    <option value="twitch">Twitch</option>
                </select>
            </div>
            <div class="form-group">
                <label>URL o Handle (@nome) o Channel ID</label>
                <input type="text" id="inputId" class="form-control" placeholder="https://youtube.com/@IlPregianza oppure UC...">
            </div>
            <button class="btn btn-primary" onclick="addChannel()">Aggiungi Canale</button>
        </div>
    </div>

    <script>
        let channels = JSON.parse(localStorage.getItem('bixius_user_channels')) || [];
        let lastWatched = JSON.parse(localStorage.getItem('bixius_last_watched')) || null;
        let videoProgress = JSON.parse(localStorage.getItem('bixius_video_progress')) || {};

        // === AUTO RESOLVE YOUTUBE CHANNEL ID ===
        async function resolveYouTubeId(input) {
            let clean = input.trim();
            if (clean.includes('youtube.com/channel/')) {
                return clean.split('channel/')[1].split('/')[0].split('?')[0];
            }
            if (clean.includes('/@')) {
                // Per ora usiamo direttamente l'handle, ma proviamo prima con channel_id
                return clean;
            }
            if (clean.startsWith('UC') && clean.length > 20) return clean;
            return clean;
        }

        function launchVideo(videoId, title, channelId) {
            const url = `https://www.youtube.com/embed/${videoId}?autoplay=1&modestbranding=1&rel=0&start=${Math.floor(videoProgress[videoId] || 0)}`;
            
            const wrapper = document.getElementById('playerWrapper');
            wrapper.innerHTML = `<iframe src="${url}" allowfullscreen allow="autoplay; encrypted-media" id="ytPlayer"></iframe>`;

            // Salva ultimo visto
            lastWatched = { videoId, title, channelId, timestamp: Date.now() };
            localStorage.setItem('bixius_last_watched', JSON.stringify(lastWatched));

            renderLastWatched();
        }

        function renderLastWatched() {
            const container = document.getElementById('lastWatchedContainer');
            const titleEl = document.getElementById('lastWatchedTitle');
            
            if (lastWatched) {
                titleEl.style.display = 'block';
                container.innerHTML = `
                    <div class="video-card" onclick="playLastWatched()">
                        <div class="info-area">
                            <div class="v-title">${lastWatched.title}</div>
                            <div class="v-meta">Ultimo visto • ${new Date(lastWatched.timestamp).toLocaleDateString('it-IT')}</div>
                        </div>
                    </div>
                `;
            }
        }

        function playLastWatched() {
            if (lastWatched) {
                launchVideo(lastWatched.videoId, lastWatched.title);
            }
        }

        // Salva progresso video
        function saveProgress() {
