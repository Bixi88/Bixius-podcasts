<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bixius's Choice Podcasts</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">

    <link rel="manifest" href="./manifest.json">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=YouTube+Sans:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        :root {
            --bg-main: #0f0f0f;
            --bg-surface: #212121;
            --bg-surface-hover: #272727;
            --text-main: #ffffff;
            --text-secondary: #aaaaaa;
            --yt-red: #ff0000;
            --twitch-purple: #9146ff;
            --font-yt: 'YouTube Sans', 'Roboto', sans-serif;
            --font-main: 'Roboto', sans-serif;
            --radius-player: 16px;
            --radius-card: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        .top-bar {
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background-color: var(--bg-main);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand .play-logo {
            color: var(--yt-red);
            font-size: 28px;
        }

        .brand h1 {
            font-family: var(--font-yt);
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.6px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .icon-btn:hover {
            background-color: var(--bg-surface-hover);
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .view-panel {
            display: none;
        }

        .view-panel.active {
            display: block;
        }

        .marquee-wrapper {
            position: relative;
            background-color: var(--bg-surface);
            padding: 10px 0;
            border-radius: var(--radius-player) var(--radius-player) 0 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            margin-top: 12px;
        }

        .marquee-wrapper::before, .marquee-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            width: 40px;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        .marquee-wrapper::before { left: 0; background: linear-gradient(to right, var(--bg-surface), transparent); }
        .marquee-wrapper::after { right: 0; background: linear-gradient(to left, var(--bg-surface), transparent); }

        .marquee-content {
            display: flex;
            white-space: nowrap;
            gap: 60px;
            animation: marquee-anim 20s linear infinite;
        }

        .marquee-content p {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        @keyframes marquee-anim {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }

        .player-section {
            margin-bottom: 24px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.7);
            border-radius: 0 0 var(--radius-player) var(--radius-player);
            overflow: hidden;
            background-color: var(--bg-surface);
        }

        .player-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            position: relative;
        }

        .player-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .no-video-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            gap: 12px;
            padding: 20px;
            text-align: center;
        }

        .no-video-placeholder i {
            font-size: 48px;
            color: var(--yt-red);
        }

        .section-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 12px;
            padding-left: 4px;
        }

        .channels-slider {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 6px 4px 16px 4px;
            scroll-behavior: smooth;
        }

        .channels-slider::-webkit-scrollbar {
            display: none;
        }

        .channel-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .avatar-circle {
            position: relative;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            padding: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            transition: all 0.3s;
        }

        .channel-item .avatar-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 24px;
            border: 3px solid var(--bg-main);
        }

        .channel-item.active .avatar-circle {
            background: linear-gradient(45deg, var(--yt-red), #ff6b6b);
        }

        .channel-item.twitch-type.active .avatar-circle {
            background: linear-gradient(45deg, var(--twitch-purple), #a970ff);
        }

        .channel-item span {
            font-size: 11px;
            font-weight: 500;
            max-width: 76px;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-secondary);
        }

        .channel-item.active span {
            color: var(--text-main);
            font-weight: 700;
        }

        .video-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 12px;
        }

        .video-card {
            display: flex;
            gap: 12px;
            padding: 14px;
            background-color: var(--bg-surface);
            border-radius: var(--radius-card);
            cursor: pointer;
            transition: background-color 0.2s, transform 0.2s, opacity 0.3s;
            align-items: center;
            opacity: 0;
            transform: translateX(-12px);
            animation: materialFadeIn 0.5s cubic-bezier(0.21, 0.94, 0.33, 1) forwards;
            border: 2px solid transparent;
        }

        .video-card:hover {
            background-color: var(--bg-surface-hover);
        }

        /* Highlight Video Attivo (YouTube) */
        .video-card.active-yt {
            border-color: var(--yt-red);
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
            background-color: var(--bg-surface-hover);
        }

        /* Highlight Video Attivo (Twitch) */
        .video-card.active-twitch {
            border-color: var(--twitch-purple);
            box-shadow: 0 0 10px rgba(145, 70, 255, 0.2);
            background-color: var(--bg-surface-hover);
        }

        /* Stato Video Completato: Solo elegantemente oscurato */
        .video-card.completed {
            opacity: 0.30 !important;
        }

        @keyframes materialFadeIn {
            to { opacity: 1; transform: translateX(0); }
        }

        .info-area {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
        }

        .v-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            line-height: 1.35;
        }

        .v-meta {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .settings-card {
            background-color: var(--bg-surface);
            padding: 20px;
            border-radius: var(--radius-player);
            margin-top: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            background-color: #161616;
            border: 1px solid #333;
            color: #fff;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-primary { background-color: var(--yt-red); color: #fff; }
        .btn-secondary { background-color: #333; color: #fff; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">
            <i class="material-icons-round play-logo">play_circle_filled</i>
            <h1 id="appTitle">Bixius's Choice Podcasts</h1>
        </div>
        <button class="icon-btn" id="toggleViewBtn" onclick="toggleView()">
            <i class="material-icons-round" id="viewIcon">settings</i>
        </button>
    </div>

    <div id="homePanel" class="container view-panel active">
        <div class="marquee-wrapper">
            <div class="marquee-content" id="marqueeText">
                <p>Nessun video in riproduzione</p>
                <p>Nessun video in riproduzione</p>
            </div>
        </div>

        <div class="player-section">
            <div class="player-wrapper" id="playerWrapper">
                <div id="ytIframeContainer"></div>
            </div>
        </div>

        <h2 class="section-title">I tuoi canali</h2>
        <div class="channels-slider" id="channelsSlider"></div>

        <h2 class="section-title" id="currentChannelTitle" style="display:none;">Ultimi video pubblicati</h2>
        <div class="video-list" id="videoList">
            <p id="initialPlaceholder" style="padding: 24px 4px; color: var(--text-secondary); text-align: center; font-size: 14px;">
                Nessun canale selezionato. Usa l'ingranaggio per configurare la lista.
            </p>
        </div>
    </div>

    <div id="settingsPanel" class="container view-panel">
        <div class="settings-card">
            <h2 style="font-size:18px; margin-bottom:12px;">Gestione Canali</h2>
            <div class="form-group">
                <label>Nome del Canale (Es. Pregianza)</label>
                <input type="text" id="inputName" class="form-control" placeholder="Es. Pregianza">
            </div>
            <div class="form-group">
                <label>Piattaforma</label>
                <select id="inputPlatform" class="form-control" onchange="updatePlaceholder()">
                    <option value="youtube_channel">YouTube (ID Canale UC...)</option>
                    <option value="youtube_video">YouTube (ID Singolo Video o Playlist ID)</option>
                    <option value="twitch">Twitch (Nome Utente Canale)</option>
                </select>
            </div>
            <div class="form-group">
                <label id="idLabel">ID Canale UC...</label>
                <input type="text" id="inputId" class="form-control" placeholder="Incolla l'ID qui...">
            </div>
            <div class="btn-row">
                <button class="btn btn-secondary" onclick="toggleView()">Chiudi</button>
                <button class="btn btn-primary" id="addBtn" onclick="addChannel()">Aggiungi Canale</button>
            </div>
            
            <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin: 20px 0;">
            <button class="btn btn-secondary" style="width:100%; background-color:#8b0000;" onclick="clearAllChannels()">Svuota Tutti i Canali</button>
        </div>
    </div>

    <script>
        let channels = JSON.parse(localStorage.getItem('bixius_user_channels')) || [];
        let currentView = 'home';
        let displayedVideoUrls = new Set();
        let loadedItems = [];
        let currentVisibleCount = 10;
        let currentSelectedChannelType = 'youtube_channel';
        
        let ytPlayer = null;
        let timeTrackerInterval = null;
        let currentPlayingVideoId = null;
        let apiReady = false;

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            apiReady = true;
            loadLastWatchedVideoOnInit();
        }

        function updatePlaceholder() {
            const platform = document.getElementById('inputPlatform').value;
            const label = document.getElementById('idLabel');
            const input = document.getElementById('inputId');
            if(platform === 'twitch') {
                label.innerText = "Nome Utente Twitch (Es: pregianza)";
                input.placeholder = "pregianza";
            } else if (platform === 'youtube_channel') {
                label.innerText = "ID Canale YouTube UC... (Metti direttamente l'ID)";
                input.placeholder = "UCxxxxxxxxxxxxxxxxx";
            } else {
                label.innerText = "ID Video Singolo o ID Playlist (Es: PL...)";
                input.placeholder = "Incolla l'ID...";
            }
        }

        function cleanInputId(input, platform) {
            let clean = input.trim();
            if (platform === 'twitch') {
                if (clean.includes('twitch.tv/')) {
                    clean = clean.split('twitch.tv/').pop().split('/')[0].split('?')[0];
                }
            } else if (platform === 'youtube_video') {
                if (clean.includes('v=')) {
                    clean = clean.split('v=')[1].split('&')[0];
                } else if (clean.includes('youtu.be/')) {
                    clean = clean.split('youtu.be/')[1].split('?')[0];
                } else if (clean.includes('list=')) {
                    clean = clean.split('list=')[1].split('&')[0];
                }
            } else if (platform === 'youtube_channel') {
                if (clean.includes('youtube.com/channel/')) {
                    clean = clean.split('youtube.com/channel/')[1].split('/')[0].split('?')[0];
                }
            }
            return clean;
        }

        function renderAppChannels() {
            const slider = document.getElementById('channelsSlider');
            slider.innerHTML = '';
            if(channels.length === 0) {
                slider.innerHTML = `<p style="font-size:13px; color:var(--text-secondary); padding:10px;">Nessun canale configurato.</p>`;
                return;
            }
            channels.forEach(chan => {
                const isTwitch = chan.platform === 'twitch';
                const item = document.createElement('div');
                item.className = `channel-item ${isTwitch ? 'twitch-type' : ''}`;
                item.id = `app-chan-${chan.id}`;
                item.onclick = () => selectChannel(chan.id);
                item.innerHTML = `
                    <div class="avatar-circle"><div class="avatar-placeholder">${chan.name.charAt(0).toUpperCase()}</div></div>
                    <span>${chan.name}</span>
                `;
                slider.appendChild(item);
            });
        }

        function displayItems() {
            const listContainer = document.getElementById('videoList');
            const targetCount = Math.min(currentVisibleCount, loadedItems.length);
            
            const completedVideos = JSON.parse(localStorage.getItem('bixius_video_completati')) || [];
            
            for (let i = listContainer.children.length; i < targetCount; i++) {
                const item = loadedItems[i];
                if (!item || displayedVideoUrls.has(item.videoId)) continue;
                displayedVideoUrls.add(item.videoId);

                const card = document.createElement('div');
                card.id = `card-${item.videoId}`;
                
                const isCompleted = completedVideos.includes(item.videoId);
                
                let activeClass = '';
                if (item.videoId === currentPlayingVideoId) {
                    activeClass = currentSelectedChannelType === 'twitch' ? ' active-twitch' : ' active-yt';
                }

                card.className = `video-card${isCompleted ? ' completed' : ''}${activeClass}`;
                card.onclick = () => launchVideo(item.videoId, item.title);
                card.style.animationDelay = `${(i % 10) * 40}ms`;
                
                card.innerHTML = `
                    <div class="info-area">
                        <div class="v-title">${item.title}</div>
                        <div class="v-meta">
                            ${item.durationText ? 'Durata: ' + item.durationText : 'Video Standard'}
                        </div>
                    </div>
                `;
                listContainer.appendChild(card);
            }
        }

        async function selectChannel(id) {
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            const currentTab = document.getElementById(`app-chan-${id}`);
            if(currentTab) currentTab.classList.add('active');

            const channel = channels.find(c => c.id === id);
            currentSelectedChannelType = channel.platform;
            
            document.getElementById('currentChannelTitle').innerText = `Contenuti di ${channel.name}`;
            document.getElementById('currentChannelTitle').style.display = 'block';

            const listContainer = document.getElementById('videoList');
            listContainer.innerHTML = '<p style="padding:20px; text-align:center; color:var(--text-secondary);">Filtrazione ed eliminazione Shorts...</p>';
            
            loadedItems = [];
            currentVisibleCount = 10;
            displayedVideoUrls.clear();

            if (channel.platform === 'youtube_channel') {
                try {
                    const targetUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channel.sourceId}`;
                    const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(targetUrl)}`);
                    const xmlText = await res.text();
                    
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                    const entries = xmlDoc.getElementsByTagName("entry");

                    if(entries.length === 0) {
                        listContainer.innerHTML = '<p style="padding:20px; text-align:center; color:var(--text-secondary);">Canale vuoto.</p>';
                        return;
                    }

                    for (let i = 0; i < entries.length; i++) {
                        const entry = entries[i];
                        const title = entry.getElementsByTagName("title")[0].textContent;
                        const videoId = entry.getElementsByTagName("yt:videoId")[0].textContent;
                        
                        let seconds = 0;
                        let durationText = "";
                        const durationElements = entry.getElementsByTagName("media:duration");
                        
                        if(durationElements.length > 0) {
                            seconds = parseInt(durationElements[0].textContent, 10) || 0;
                            const mins = Math.floor(seconds / 60);
                            durationText = mins > 0 ? `${mins} min` : `${seconds} s`;
                        }

                        if ((seconds > 0 && seconds < 90) || 
                            title.toLowerCase().includes('#shorts') || 
                            title.toLowerCase().includes('/shorts/')) {
                            continue; 
                        }

                        loadedItems.push({
                            title: title,
                            videoId: videoId,
                            durationText: durationText
                        });
                    }
                    
                    listContainer.innerHTML = '';
                    displayItems();

                } catch (err) {
                    console.error(err);
                    listContainer.innerHTML = '<p style="padding:20px; text-align:center; color:var(--text-secondary);">Errore caricamento feed.</p>';
                }
            } else if (channel.platform === 'youtube_video') {
                listContainer.innerHTML = '';
                const card = document.createElement('div');
                card.id = `card-${channel.sourceId}`;
                
                let activeClass = (channel.sourceId === currentPlayingVideoId) ? ' active-yt' : '';
                card.className = `video-card${activeClass}`;
                card.onclick = () => launchVideo(channel.sourceId, channel.name);
                card.innerHTML = `<div class="info-area"><div class="v-title">Apri Risorsa: ${channel.name}</div><div class="v-meta">Contenuto Diretto</div></div>`;
                listContainer.appendChild(card);
            } else if (channel.platform === 'twitch') {
                listContainer.innerHTML = '';
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => {
                    document.querySelectorAll('.video-card').forEach(c => c.classList.remove('active-yt', 'active-twitch'));
                    card.classList.add('active-twitch');
                    window.open(`https://www.twitch.tv/${channel.sourceId}/videos`, '_blank');
                };
                card.innerHTML = `
                    <div class="info-area">
                        <div class="v-title">Apri i Video e la Live di ${channel.name} su Twitch</div>
                        <div class="v-meta">Piattaforma Esterna (Twitch)</div>
                    </div>
                `;
                listContainer.appendChild(card);
            }
        }

        window.onscroll = function() {
            if (loadedItems.length === 0) return;
            if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 100) {
                if (currentVisibleCount < loadedItems.length) {
                    currentVisibleCount += 5;
                    displayItems();
                }
            }
        };

        function launchVideo(videoId, title, savedStartSeconds = 0) {
            if(!apiReady) return;
            
            currentPlayingVideoId = videoId;
            
            localStorage.setItem('bixius_last_video_data', JSON.stringify({
                videoId: videoId,
                title: title,
                platform: currentSelectedChannelType
            }));

            document.getElementById('marqueeText').innerHTML = `<p>NOW PLAYING: ${title.toUpperCase()}</p><p>NOW PLAYING: ${title.toUpperCase()}</p>`;
            
            document.querySelectorAll('.video-card').forEach(c => c.classList.remove('active-yt', 'active-twitch'));
            const selectedCard = document.getElementById(`card-${videoId}`);
            if(selectedCard) {
                selectedCard.classList.add(currentSelectedChannelType === 'twitch' ? 'active-twitch' : 'active-yt');
            }

            let startAt = savedStartSeconds;
            if (startAt === 0) {
                const history = JSON.parse(localStorage.getItem('bixius_video_timestamps')) || {};
                startAt = history[videoId] || 0;
            }

            if(ytPlayer) {
                try { ytPlayer.destroy(); } catch(e){}
            }

            document.getElementById('playerWrapper').innerHTML = `<div id="ytIframeContainer"></div>`;

            ytPlayer = new YT.Player('ytIframeContainer', {
                width: '100%',
                height: '100%',
                videoId: videoId,
                playerVars: {
                    'autoplay': 1,
                    'start': startAt,
                    'modestbranding': 1,
                    'rel': 0,
                    'playsinline': 1,
                    'origin': window.location.origin
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                startTimeTracker();
            } else {
                stopTimeTracker();
                saveCurrentTimestamp();
            }
        }

        function startTimeTracker() {
            stopTimeTracker();
            timeTrackerInterval = setInterval(() => {
                saveCurrentTimestamp();
            }, 2000);
        }

        function stopTimeTracker() {
            if (timeTrackerInterval) {
                clearInterval(timeTrackerInterval);
                timeTrackerInterval = null;
            }
        }

        function saveCurrentTimestamp() {
            if (ytPlayer && typeof ytPlayer.getCurrentTime === 'function' && currentPlayingVideoId) {
                const currentTime = Math.floor(ytPlayer.getCurrentTime());
                const duration = Math.floor(ytPlayer.getDuration() || 0);
                
                if (duration > 0 && (duration - currentTime) < 40) {
                    const history = JSON.parse(localStorage.getItem('bixius_video_timestamps')) || {};
                    delete history[currentPlayingVideoId];
                    localStorage.setItem('bixius_video_timestamps', JSON.stringify(history));
                    
                    const completedVideos = JSON.parse(localStorage.getItem('bixius_video_completati')) || [];
                    if (!completedVideos.includes(currentPlayingVideoId)) {
                        completedVideos.push(currentPlayingVideoId);
                        localStorage.setItem('bixius_video_completati', JSON.stringify(completedVideos));
                        
                        // Si dissolve solo l'opacità all'istante in modo pulito
                        const card = document.getElementById(`card-${currentPlayingVideoId}`);
                        if(card) {
                            card.classList.add('completed');
                        }
                    }
                    return;
                }

                if (currentTime > 2) {
                    const history = JSON.parse(localStorage.getItem('bixius_video_timestamps')) || {};
                    history[currentPlayingVideoId] = currentTime;
                    localStorage.setItem('bixius_video_timestamps', JSON.stringify(history));
                }
            }
        }

        function loadLastWatchedVideoOnInit() {
            const lastVideoData = JSON.parse(localStorage.getItem('bixius_last_video_data'));
            if (lastVideoData && lastVideoData.videoId && apiReady) {
                currentSelectedChannelType = lastVideoData.platform || 'youtube_channel';
                const history = JSON.parse(localStorage.getItem('bixius_video_timestamps')) || {};
                const savedSeconds = history[lastVideoData.videoId] || 0;
                launchVideo(lastVideoData.videoId, lastVideoData.title, savedSeconds);
            } else {
                document.getElementById('playerWrapper').innerHTML = `
                    <div class="no-video-placeholder">
                        <i class="material-icons-round">play_arrow</i>
                        <p>Scegli un canale, poi clicca su un contenuto in basso</p>
                    </div>`;
            }
        }

        function addChannel() {
            const name = document.getElementById('inputName').value.trim();
            const platform = document.getElementById('inputPlatform').value;
            const rawId = document.getElementById('inputId').value.trim();

            if (!name || !rawId) return;

            let sourceId = cleanInputId(rawId, platform);
            const newId = name.toLowerCase().replace(/[^a-z0-9]/g, '') + Math.floor(Math.random() * 1000);

            channels.push({ id: newId, name: name, platform: platform, sourceId: sourceId });
            localStorage.setItem('bixius_user_channels', JSON.stringify(channels));
            
            document.getElementById('inputName').value = '';
            document.getElementById('inputId').value = '';
            
            renderAppChannels();
            toggleView();
        }

        function clearAllChannels() {
            if(confirm("Sei sicuro di voler cancellare tutti i canali salvati?")) {
                channels = [];
                localStorage.removeItem('bixius_user_channels');
                localStorage.removeItem('bixius_video_timestamps');
                localStorage.removeItem('bixius_last_video_data');
                localStorage.removeItem('bixius_video_completati');
                renderAppChannels();
                document.getElementById('videoList').innerHTML = '<p style="padding:24px 4px; color:var(--text-secondary); text-align:center;">Tutti i canali e la cronologia sono stati rimossi.</p>';
                toggleView();
            }
        }

        function toggleView() {
            const home = document.getElementById('homePanel');
            const settings = document.getElementById('settingsPanel');
            const icon = document.getElementById('viewIcon');

            if (currentView === 'home') {
                home.classList.remove('active');
                settings.classList.add('active');
                icon.innerText = 'close';
                currentView = 'settings';
            } else {
                settings.classList.remove('active');
                home.classList.add('active');
                icon.innerText = 'settings';
                currentView = 'home';
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log("SW Error:", err));
        }

        window.onload = function() {
            renderAppChannels();
            if(apiReady) {
                loadLastWatchedVideoOnInit();
            }
        };

        window.onbeforeunload = function() {
            saveCurrentTimestamp();
        };
    </script>
</body>
</html>
