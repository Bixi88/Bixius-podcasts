<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bixius's Choice Podcasts</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">

    <link rel="manifest" href="./manifest.json">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=YouTube+Sans:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        :root {
            --bg-main: #0f0f0f; /* Nero assoluto per schermi AMOLED */
            --bg-surface: #161616;
            --bg-surface-hover: #212121;
            --text-main: #ffffff;
            --text-secondary: #aaaaaa;
            --yt-red: #ff0000;
            --twitch-purple: #9146ff;
            --font-yt: 'YouTube Sans', 'Roboto', sans-serif;
            --font-main: 'Roboto', sans-serif;
            --radius-player: 16px;
            --radius-card: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        .top-bar {
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background-color: var(--bg-main);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand .play-logo {
            color: var(--yt-red);
            font-size: 28px;
        }

        .brand h1 {
            font-family: var(--font-yt);
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.6px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .icon-btn:hover {
            background-color: var(--bg-surface-hover);
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .view-panel {
            display: none;
        }

        .view-panel.active {
            display: block;
        }

        .player-section {
            margin-top: 16px;
            margin-bottom: 24px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.8);
            border-radius: var(--radius-player);
            overflow: hidden; /* Taglia gli angoli dell'iframe interno */
            background-color: #000;
        }

        .player-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            position: relative;
            border-radius: var(--radius-player);
            overflow: hidden;
        }

        .player-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: var(--radius-player);
        }

        .no-video-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            gap: 12px;
            padding: 20px;
            text-align: center;
        }

        .no-video-placeholder i {
            font-size: 48px;
            color: var(--yt-red);
        }

        .section-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 12px;
            padding-left: 4px;
            color: var(--text-secondary);
        }

        .channels-slider {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 6px 4px 16px 4px;
            scroll-behavior: smooth;
        }

        .channels-slider::-webkit-scrollbar {
            display: none;
        }

        .channel-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1);
        }

        .channel-item:active {
            transform: scale(0.95);
        }

        .avatar-circle {
            position: relative;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            padding: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            transition: background 0.25s ease;
        }

        .channel-item img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--bg-main);
            background-color: var(--bg-surface);
        }

        .channel-item .avatar-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 24px;
            border: 3px solid var(--bg-main);
        }

        .channel-item.active .avatar-circle {
            background: linear-gradient(45deg, var(--yt-red), #ff5555);
        }

        .channel-item.twitch-type.active .avatar-circle {
            background: linear-gradient(45deg, var(--twitch-purple), #b380ff);
        }

        .channel-item span {
            font-size: 11px;
            font-weight: 500;
            max-width: 76px;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-secondary);
            transition: color 0.2s;
        }

        .channel-item.active span {
            color: var(--text-main);
            font-weight: 700;
        }

        .video-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 12px;
        }

        .video-card {
            display: flex;
            gap: 12px;
            padding: 14px;
            background-color: var(--bg-surface);
            border-radius: var(--radius-card);
            cursor: pointer;
            align-items: center;
            opacity: 0;
            transform: translateX(-10px);
            animation: materialFadeIn 0.4s cubic-bezier(0.21, 0.94, 0.33, 1) forwards;
            border: 2px solid transparent;
            /* Transizione fluida e rapida per l'accento visivo al click */
            transition: border-color 0.15s cubic-bezier(0.2, 0, 0, 1), 
                        box-shadow 0.15s cubic-bezier(0.2, 0, 0, 1), 
                        background-color 0.2s, opacity 0.3s;
        }

        .video-card:hover {
            background-color: var(--bg-surface-hover);
        }

        /* Highlight Fluido Video Attivo (YouTube) */
        .video-card.active-yt {
            border-color: var(--yt-red);
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.15);
            background-color: var(--bg-surface-hover);
        }

        /* Highlight Fluido Video Attivo (Twitch) */
        .video-card.active-twitch {
            border-color: var(--twitch-purple);
            box-shadow: 0 0 12px rgba(145, 70, 255, 0.15);
            background-color: var(--bg-surface-hover);
        }

        /* Stato Video Completato: Elegantemente solo oscurato */
        .video-card.completed {
            opacity: 0.30 !important;
        }

        @keyframes materialFadeIn {
            to { opacity: 1; transform: translateX(0); }
        }

        /* SKELETON LOADING ANIMATION */
        .skeleton-card {
            height: 64px;
            background: linear-gradient(90deg, #161616 25%, #222 50%, #161616 75%);
            background-size: 200% 100%;
            animation: skeletonLoading 1.4s infinite linear;
            border-radius: var(--radius-card);
        }

        @keyframes skeletonLoading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .info-area {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
        }

        .v-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            line-height: 1.35;
        }

        .v-meta {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .settings-card {
            background-color: var(--bg-surface);
            padding: 20px;
            border-radius: var(--radius-player);
            margin-top: 16px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            background-color: var(--bg-main);
            border: 1px solid #333;
            color: #fff;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            border-color: var(--text-secondary);
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 14px;
            transition: filter 0.2s;
        }

        .btn:active { filter: brightness(0.8); }
        .btn-primary { background-color: var(--yt-red); color: #fff; }
        .btn-secondary { background-color: #272727; color: #fff; }
        .btn-danger { background-color: #4a0000; color: #ff8888; }

        /* LISTA GESTIONE CANALI CHIRURGICA */
        .manage-channels-list {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .manage-channel-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background-color: var(--bg-main);
            border: 1px solid #222;
            border-radius: 8px;
        }

        .manage-channel-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .manage-channel-actions {
            display: flex;
            gap: 4px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px;
            border-radius: 4px;
            display: flex;
            align-items: center;
        }

        .action-btn:hover {
            background-color: #222;
            color: #fff;
        }

        .action-btn.del:hover {
            color: #ff4444;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">
            <i class="material-icons-round play-logo">play_circle_filled</i>
            <h1 id="appTitle">Bixius's Choice Podcasts</h1>
        </div>
        <button class="icon-btn" id="toggleViewBtn" onclick="toggleView()">
            <i class="material-icons-round" id="viewIcon">settings</i>
        </button>
    </div>

    <div id="homePanel" class="container view-panel active">
        <div class="player-section">
            <div class="player-wrapper" id="playerWrapper">
                <div id="ytIframeContainer"></div>
            </div>
        </div>

        <h2 class="section-title">I tuoi canali</h2>
        <div class="channels-slider" id="channelsSlider"></div>

        <h2 class="section-title" id="currentChannelTitle" style="display:none;">Ultimi video pubblicati</h2>
        <div class="video-list" id="videoList">
            <p id="initialPlaceholder" style="padding: 24px 4px; color: var(--text-secondary); text-align: center; font-size: 14px;">
                Nessun canale selezionato. Usa l'ingranaggio per configurare la lista.
            </p>
        </div>
    </div>

    <div id="settingsPanel" class="container view-panel">
        <div class="settings-card">
            <h2 style="font-size:16px; margin-bottom:14px; font-weight:700;">Aggiungi Nuovo Canale</h2>
            <div class="form-group">
                <label>Nome Personalizzato</label>
                <input type="text" id="inputName" class="form-control" placeholder="Es. Pregianza">
            </div>
            <div class="form-group">
                <label>Piattaforma</label>
                <select id="inputPlatform" class="form-control" onchange="updatePlaceholder()">
                    <option value="youtube_channel">YouTube Channel</option>
                    <option value="twitch">Twitch</option>
                </select>
            </div>
            <div class="form-group">
                <label id="idLabel">ID Canale UC...</label>
                <input type="text" id="inputId" class="form-control" placeholder="Incolla l'ID qui...">
            </div>
            <button class="btn btn-primary" style="width:100%;" onclick="addChannel()">
                <i class="material-icons-round" style="font-size:18px;">add</i>Aggiungi nella lista
            </button>
        </div>

        <div class="settings-card">
            <h2 style="font-size:16px; margin-bottom:4px; font-weight:700;">I Tuoi Canali Salvati</h2>
            <p style="font-size:12px; color:var(--text-secondary); margin-bottom:12px;">Rinomina o elimina chirurgicamente i singoli elementi.</p>
            <div class="manage-channels-list" id="manageChannelsList"></div>
        </div>

        <div class="settings-card">
            <h2 style="font-size:16px; margin-bottom:12px; font-weight:700;">Manutenzione Dati</h2>
            <div style="display:flex; flex-direction:column; gap:10px;">
                <button class="btn btn-secondary" style="background-color:#222; text-align:left; justify-content:flex-start;" onclick="resetOnlyCache()">
                    <i class="material-icons-round" style="color:var(--text-secondary)">layers_clear</i> Svuota solo Cronologia e Video Visti
                </button>
                <button class="btn btn-danger" style="text-align:left; justify-content:flex-start;" onclick="clearAllChannels()">
                    <i class="material-icons-round">delete_forever</i> Cancella Tutto (Canali + Memoria)
                </button>
            </div>
        </div>
    </div>

    <script>
        let channels = JSON.parse(localStorage.getItem('bixius_user_channels')) || [];
        let channelAvatars = JSON.parse(localStorage.getItem('bixius_channel_avatars')) || {};
        let currentView = 'home';
        let displayedVideoUrls = new Set();
        let loadedItems = [];
        let currentVisibleCount = 10;
        let currentSelectedChannelType = 'youtube_channel';
        
        let ytPlayer = null;
        let timeTrackerInterval = null;
        let currentPlayingVideoId = null;
        let apiReady = false;

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            apiReady = true;
            loadLastWatchedVideoOnInit();
        }

        function updatePlaceholder() {
            const platform = document.getElementById('inputPlatform').value;
            const label = document.getElementById('idLabel');
            const input = document.getElementById('inputId');
            if(platform === 'twitch') {
                label.innerText = "Nome Utente Twitch";
                input.placeholder = "pregianza";
            } else {
                label.innerText = "ID Canale YouTube UC...";
                input.placeholder = "UCxxxxxxxxxxxxxxxxx";
            }
        }

        function cleanInputId(input, platform) {
            let clean = input.trim();
            if (platform === 'twitch') {
                if (clean.includes('twitch.tv/')) {
                    clean = clean.split('twitch.tv/').pop().split('/')[0].split('?')[0];
                }
            } else if (platform === 'youtube_channel') {
                if (clean.includes('youtube.com/channel/')) {
                    clean = clean.split('youtube.com/channel/')[1].split('/')[0].split('?')[0];
                }
            }
            return clean;
        }

        // Rendering con supporto immagini automatiche
        function renderAppChannels() {
            const slider = document.getElementById('channelsSlider');
            slider.innerHTML = '';
            if(channels.length === 0) {
                slider.innerHTML = `<p style="font-size:13px; color:var(--text-secondary); padding:10px;">Nessun canale configurato.</p>`;
                return;
            }
            channels.forEach(chan => {
                const isTwitch = chan.platform === 'twitch';
                const item = document.createElement('div');
                item.className = `channel-item ${isTwitch ? 'twitch-type' : ''}`;
                item.id = `app-chan-${chan.id}`;
                item.onclick = () => selectChannel(chan.id);
                
                // Fallback automatico se l'avatar non è ancora stato memorizzato dal feed
                let avatarHtml = `<div class="avatar-placeholder">${chan.name.charAt(0).toUpperCase()}</div>`;
                if (channelAvatars[chan.sourceId]) {
                    avatarHtml = `<img src="${channelAvatars[chan.sourceId]}" alt="${chan.name}">`;
                } else if (isTwitch) {
                    // Fallback statico elegante per Twitch se non caricato
                    const twitchAvatar = `https://id.twitch.tv/static/user_picture.png`; 
                    avatarHtml = `<img src="${twitchAvatar}" alt="${chan.name}">`;
                }

                item.innerHTML = `
                    <div class="avatar-circle">${avatarHtml}</div>
                    <span>${chan.name}</span>
                `;
                slider.appendChild(item);
            });
        }

        // Renderizza chirurgicamente la lista canali dentro i Settings
        function renderManageChannelsList() {
            const list = document.getElementById('manageChannelsList');
            list.innerHTML = '';
            if (channels.length === 0) {
                list.innerHTML = `<p style="font-size:13px; color:var(--text-secondary); padding:4px 0;">Nessun canale salvato.</p>`;
                return;
            }
            channels.forEach(chan => {
                const typeText = chan.platform === 'twitch' ? 'Twitch' : 'YouTube';
                const div = document.createElement('div');
                div.className = 'manage-channel-item';
                div.innerHTML = `
                    <div class="manage-channel-info">
                        <strong style="font-size:14px;">${chan.name}</strong>
                        <span style="font-size:11px; color:var(--text-secondary);">${typeText}: ${chan.sourceId}</span>
                    </div>
                    <div class="manage-channel-actions">
                        <button class="action-btn" onclick="renameChannel('${chan.id}')" title="Rinomina"><i class="material-icons-round" style="font-size:18px;">edit</i></button>
                        <button class="action-btn del" onclick="deleteSingleChannel('${chan.id}')" title="Elimina"><i class="material-icons-round" style="font-size:18px;">delete</i></button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function displayItems() {
            const listContainer = document.getElementById('videoList');
            const targetCount = Math.min(currentVisibleCount, loadedItems.length);
            const completedVideos = JSON.parse(localStorage.getItem('bixius_video_completati')) || [];
            
            for (let i = listContainer.children.length; i < targetCount; i++) {
                const item = loadedItems[i];
                if (!item || displayedVideoUrls.has(item.videoId)) continue;
                displayedVideoUrls.add(item.videoId);

                const card = document.createElement('div');
                card.id = `card-${item.videoId}`;
                
                const isCompleted = completedVideos.includes(item.videoId);
                let activeClass = '';
                if (item.videoId === currentPlayingVideoId) {
                    activeClass = currentSelectedChannelType === 'twitch' ? ' active-twitch' : ' active-yt';
                }

                card.className = `video-card${isCompleted ? ' completed' : ''}${activeClass}`;
                card.onclick = () => launchVideo(item.videoId, item.title);
                card.style.animationDelay = `${(i % 10) * 30}ms`;
                
                card.innerHTML = `
                    <div class="info-area">
                        <div class="v-title">${item.title}</div>
                        <div class="v-meta">${item.durationText ? 'Durata: ' + item.durationText : 'Video Standard'}</div>
                    </div>
                `;
                listContainer.appendChild(card);
            }
        }

        async function selectChannel(id) {
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            const currentTab = document.getElementById(`app-chan-${id}`);
            if(currentTab) currentTab.classList.add('active');

            const channel = channels.find(c => c.id === id);
            currentSelectedChannelType = channel.platform;
            
            document.getElementById('currentChannelTitle').innerText = `Contenuti di ${channel.name}`;
            document.getElementById('currentChannelTitle').style.display = 'block';

            const listContainer = document.getElementById('videoList');
            
            // SKELETON LOADING INVECE DEL TESTO SQUADRATO
            listContainer.innerHTML = `
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            `;
            
            loadedItems = [];
            currentVisibleCount = 10;
            displayedVideoUrls.clear();

            if (channel.platform === 'youtube_channel') {
                try {
                    const targetUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channel.sourceId}`;
                    const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(targetUrl)}`);
                    const xmlText = await res.text();
                    
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                    
                    // RECUPERO AUTOMATICO LOGO DA FEED RSS YOUTUBE
                    try {
                        const authorNode = xmlDoc.getElementsByTagName("author")[0];
                        if (authorNode) {
                            const uriNode = authorNode.getElementsByTagName("uri")[0];
                            if (uriNode && !channelAvatars[channel.sourceId]) {
                                // Estrapola l'id per ricavare l'avatar ad alta risoluzione non distruttivo
                                channelAvatars[channel.sourceId] = `https://img.youtube.com/vi/${xmlDoc.getElementsByTagName("yt:videoId")[0].textContent}/hqdefault.jpg`;
                                // In alternativa usiamo un pattern standard di avatar o manteniamo l'iniziale se fallisce.
                            }
                        }
                    } catch(e){}

                    const entries = xmlDoc.getElementsByTagName("entry");
                    if(entries.length === 0) {
                        listContainer.innerHTML = '<p style="padding:20px; text-align:center; color:var(--text-secondary);">Canale vuoto.</p>';
                        return;
                    }

                    for (let i = 0; i < entries.length; i++) {
                        const entry = entries[i];
                        const title = entry.getElementsByTagName("title")[0].textContent;
                        const videoId = entry.getElementsByTagName("yt:videoId")[0].textContent;
                        
                        let seconds = 0;
                        let durationText = "";
                        const durationElements = entry.getElementsByTagName("media:duration");
                        
                        if(durationElements.length > 0) {
                            seconds = parseInt(durationElements[0].textContent, 10) || 0;
                            const mins = Math.floor(seconds / 60);
                            durationText = mins > 0 ? `${mins} min` : `${seconds} s`;
                        }

                        // Filtro incrociato Anti-Shorts definitivo
                        if ((seconds > 0 && seconds < 90) || 
                            title.toLowerCase().includes('#shorts') || 
                            title.toLowerCase().includes('/shorts/')) {
                            continue; 
                        }

                        loadedItems.push({ title: title, videoId: videoId, durationText: durationText });
                    }
                    
                    listContainer.innerHTML = '';
                    displayItems();

                } catch (err) {
                    console.error(err);
                    listContainer.innerHTML = '<p style="padding:20px; text-align:center; color:var(--text-secondary);">Errore caricamento feed.</p>';
                }
            } else if (channel.platform === 'twitch') {
                listContainer.innerHTML = '';
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => {
                    document.querySelectorAll('.video-card').forEach(c => c.classList.remove('active-yt', 'active-twitch'));
                    card.classList.add('active-twitch');
                    window.open(`https://www.twitch.tv/${channel.sourceId}/videos`, '_blank');
                };
                card.innerHTML = `
                    <div class="info-area">
                        <div class="v-title">Apri la sezione video e live di ${channel.name} su Twitch</div>
                        <div class="v-meta">Collegamento Esterno</div>
                    </div>
                `;
                listContainer.appendChild(card);
            }
        }

        window.onscroll = function() {
            if (loadedItems.length === 0) return;
            if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 100) {
                if (currentVisibleCount < loadedItems.length) {
                    currentVisibleCount += 5;
                    displayItems();
                }
            }
        };

        function launchVideo(videoId, title, savedStartSeconds = 0) {
            if(!apiReady) return;
            currentPlayingVideoId = videoId;
            
            localStorage.setItem('bixius_last_video_data', JSON.stringify({
                videoId: videoId, title: title, platform: currentSelectedChannelType
            }));

            // Highlight fluido dell'elemento attivo
            document.querySelectorAll('.video-card').forEach(c => c.classList.remove('active-yt', 'active-twitch'));
            const selectedCard = document.getElementById(`card-${videoId}`);
            if(selectedCard) {
                selectedCard.classList.add(currentSelectedChannelType === 'twitch' ? 'active-twitch' : 'active-yt');
            }

            let startAt = savedStartSeconds;
            if (startAt === 0) {
                const history = JSON.parse(localStorage.getItem('bixius_video_timestamps')) || {};
                startAt = history[videoId] || 0;
            }

            if(ytPlayer) {
                try { ytPlayer.destroy(); } catch(e){}
            }

            document.getElementById('playerWrapper').innerHTML = `<div id="ytIframeContainer"></div>`;

            ytPlayer = new YT.Player('ytIframeContainer', {
                width: '100%',
                height: '100%',
                videoId: videoId,
                playerVars: {
                    'autoplay': 1,
                    'start': startAt,
                    'modestbranding': 1,
                    'rel': 0,
                    'playsinline': 1,
                    'origin': window.location.origin
                },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                startTimeTracker();
            } else {
                stopTimeTracker();
                saveCurrentTimestamp();
            }
        }

        function startTimeTracker() {
            stopTimeTracker();
            timeTrackerInterval = setInterval(() => { saveCurrentTimestamp(); }, 2000);
        }

        function stopTimeTracker() {
            if (timeTrackerInterval) { clearInterval(timeTrackerInterval); timeTrackerInterval = null; }
        }

        function saveCurrentTimestamp() {
            if (ytPlayer && typeof ytPlayer.getCurrentTime === 'function' && currentPlayingVideoId) {
                const currentTime = Math.floor(ytPlayer.getCurrentTime());
                const duration = Math.floor(ytPlayer.getDuration() || 0);
                
                if (duration > 0 && (duration - currentTime) < 40) {
                    const history = JSON.parse(localStorage.getItem('bixius_video_timestamps')) || {};
                    delete history[currentPlayingVideoId];
                    localStorage.setItem('bixius_video_timestamps', JSON.stringify(history));
                    
                    const completedVideos = JSON.parse(localStorage.getItem('bixius_video_completati')) || [];
                    if (!completedVideos.includes(currentPlayingVideoId)) {
                        completedVideos.push(currentPlayingVideoId);
                        localStorage.setItem('bixius_video_completati', JSON.stringify(completedVideos));
                        
                        const card = document.getElementById(`card-${currentPlayingVideoId}`);
                        if(card) card.classList.add('completed');
                    }
                    return;
                }

                if (currentTime > 2) {
                    const history = JSON.parse(localStorage.getItem('bixius_video_timestamps')) || {};
                    history[currentPlayingVideoId] = currentTime;
                    localStorage.setItem('bixius_video_timestamps', JSON.stringify(history));
                }
            }
        }

        function loadLastWatchedVideoOnInit() {
            const lastVideoData = JSON.parse(localStorage.getItem('bixius_last_video_data'));
            if (lastVideoData && lastVideoData.videoId && apiReady) {
                currentSelectedChannelType = lastVideoData.platform || 'youtube_channel';
                const history = JSON.parse(localStorage.getItem('bixius_video_timestamps')) || {};
                const savedSeconds = history[lastVideoData.videoId] || 0;
                launchVideo(lastVideoData.videoId, lastVideoData.title, savedSeconds);
            } else {
                document.getElementById('playerWrapper').innerHTML = `
                    <div class="no-video-placeholder">
                        <i class="material-icons-round">play_arrow</i>
                        <p>Seleziona un canale per visualizzare e riprodurre i video</p>
                    </div>`;
            }
        }

        function addChannel() {
            const name = document.getElementById('inputName').value.trim();
            const platform = document.getElementById('inputPlatform').value;
            const rawId = document.getElementById('inputId').value.trim();

            if (!name || !rawId) return;

            let sourceId = cleanInputId(rawId, platform);
            const newId = name.toLowerCase().replace(/[^a-z0-9]/g, '') + Math.floor(Math.random() * 1000);

            channels.push({ id: newId, name: name, platform: platform, sourceId: sourceId });
            localStorage.setItem('bixius_user_channels', JSON.stringify(channels));
            
            document.getElementById('inputName').value = '';
            document.getElementById('inputId').value = '';
            
            renderAppChannels();
            renderManageChannelsList();
        }

        // GESTIONE CHIRURGICA: RINOMINA
        function renameChannel(id) {
            const chan = channels.find(c => c.id === id);
            if (!chan) return;
            const newName = prompt(`Modifica il nome per questo canale:`, chan.name);
            if (newName && newName.trim() !== "") {
                chan.name = newName.trim();
                localStorage.setItem('bixius_user_channels', JSON.stringify(channels));
                renderAppChannels();
                renderManageChannelsList();
            }
        }

        // GESTIONE CHIRURGICA: ELIMINA ELEMENTO SINGOLO
        function deleteSingleChannel(id) {
            if (confirm("Vuoi eliminare chirurgicamente questo canale?")) {
                channels = channels.filter(c => c.id !== id);
                localStorage.setItem('bixius_user_channels', JSON.stringify(channels));
                renderAppChannels();
                renderManageChannelsList();
            }
        }

        // RESET ONLY CACHE (CRONOLOGIA E VIDEO VISTI)
        function resetOnlyCache() {
            if (confirm("Sei sicuro di voler azzerare i video visti e le posizioni dei video? I tuoi canali non verranno toccati.")) {
                localStorage.removeItem('bixius_video_timestamps');
                localStorage.removeItem('bixius_video_completati');
                localStorage.removeItem('bixius_last_video_data');
                alert("Cache delle durate svuotata con successo!");
                window.location.reload();
            }
        }

        function clearAllChannels() {
            if(confirm("Sei sicuro di voler distruggere l'intero database? Perderai tutti i canali e la cronologia.")) {
                channels = [];
                channelAvatars = {};
                localStorage.clear();
                renderAppChannels();
                renderManageChannelsList();
                document.getElementById('videoList').innerHTML = '<p style="padding:24px 4px; color:var(--text-secondary); text-align:center;">Tutto cancellato.</p>';
                toggleView();
            }
        }

        function toggleView() {
            const home = document.getElementById('homePanel');
            const settings = document.getElementById('settingsPanel');
            const icon = document.getElementById('viewIcon');

            if (currentView === 'home') {
                home.classList.remove('active');
                settings.classList.add('active');
                icon.innerText = 'close';
                currentView = 'settings';
                renderManageChannelsList(); // Carica la lista chirurgica all'apertura
            } else {
                settings.classList.remove('active');
                home.classList.add('active');
                icon.innerText = 'settings';
                currentView = 'home';
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log("SW Error:", err));
        }

        window.onload = function() {
            renderAppChannels();
            if(apiReady) { loadLastWatchedVideoOnInit(); }
        };

        window.onbeforeunload = function() { saveCurrentTimestamp(); };
    </script>
</body>
</html>
