<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bixius's Choice Podcasts</title>
   
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">
    <link rel="manifest" href="./manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=YouTube+Sans:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f0f0f;
            --bg-surface: #212121;
            --bg-surface-hover: #272727;
            --text-main: #ffffff;
            --text-secondary: #aaaaaa;
            --yt-red: #ff0000;
            --twitch-purple: #9146ff;
            --font-yt: 'YouTube Sans', 'Roboto', sans-serif;
            --font-main: 'Roboto', sans-serif;
            --radius-player: 16px;
            --radius-card: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: var(--font-main); overflow-x: hidden; padding-bottom: 60px; }
        /* ... (tutto il tuo CSS rimane uguale, lo salto per brevità) ... */
    </style>
</head>
<body>
    <!-- Il tuo HTML rimane uguale fino alla sezione script -->

    <script>
        let channels = JSON.parse(localStorage.getItem('bixius_user_channels')) || [];
        let currentView = 'home';
        let displayedVideoUrls = new Set();

        function getApiKey() {
            return localStorage.getItem('bixius_yt_api_key') || "";
        }

        function saveApiKey() {
            const key = document.getElementById('inputApiKey').value.trim();
            localStorage.setItem('bixius_yt_api_key', key);
            alert(key ? "API Key salvata!" : "Chiave rimossa.");
            loadApiKey();
        }

        function loadApiKey() {
            document.getElementById('inputApiKey').value = getApiKey();
        }

        async function selectChannel(id) {
            // ... codice attivo/inattivo invariato ...

            const channel = channels.find(c => c.id === id);
            const listContainer = document.getElementById('videoList');
            listContainer.innerHTML = '<p style="padding:20px; text-align:center; color:var(--text-secondary);">Recupero in corso...</p>';

            if (channel.platform === 'youtube_channel') {
                const ucId = channel.sourceId.trim();
                console.log(`[DEBUG] Selezionato canale: ${channel.name} (${ucId})`);

                const apiKey = getApiKey();
                console.log(`[DEBUG] API Key presente: ${apiKey ? 'SÌ' : 'NO'}`);

                if (apiKey) {
                    console.log("[DEBUG] Tentativo caricamento con YouTube Data API");
                    await fetchYouTubeBatch(ucId);
                } else {
                    console.log("[DEBUG] Nessuna API Key → fallback RSS");
                    await loadWithRssFeeds(ucId);
                }
            } 
            // ... twitch e youtube_video invariati ...
        }

        async function fetchYouTubeBatch(ucId) {
            const listContainer = document.getElementById('videoList');
            const apiKey = getApiKey();
            const uuId = 'UU' + ucId.substring(2);

            try {
                const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=20&playlistId=${uuId}&key=${apiKey}`;
                console.log("[DEBUG] Chiamata API:", url);

                const res = await fetch(url);
                const data = await res.json();

                console.log(`[DEBUG] Status: ${res.status}`, data);

                if (!res.ok) {
                    listContainer.innerHTML = `<p style="color:#ff9800; padding:20px;">Errore API: ${data.error?.message || 'Quota superata'}</p>`;
                    return;
                }

                const videos = data.items.map(item => ({
                    title: item.snippet.title,
                    embedUrl: `https://www.youtube.com/embed/${item.snippet.resourceId.videoId}?autoplay=1&modestbranding=1&rel=0`
                }));

                appendVideoCards(videos, listContainer, false);
                console.log(`[DEBUG] ✅ Caricati ${videos.length} video tramite API`);

            } catch (err) {
                console.error("[DEBUG] Errore fetch:", err);
                listContainer.innerHTML = `<p>Errore di rete.</p>`;
            }
        }

        async function loadWithRssFeeds(ucId) {
            const listContainer = document.getElementById('videoList');
            let videos = [];

            try {
                // Feed 1 + Feed 2
                const feeds = [
                    `https://www.youtube.com/feeds/videos.xml?channel_id=${ucId}`,
                    `https://www.youtube.com/feeds/videos.xml?playlist_id=UU${ucId.substring(2)}`
                ];

                for (let feed of feeds) {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed)}`);
                    const data = await res.json();
                    if (data.status === 'ok') {
                        data.items.forEach(item => {
                            let vId = item.link.includes('v=') ? item.link.split('v=')[1]?.split('&')[0] : item.link.split('/').pop();
                            videos.push({
                                title: item.title,
                                embedUrl: `https://www.youtube.com/embed/${vId}?autoplay=1&modestbranding=1&rel=0`
                            });
                        });
                    }
                }

                appendVideoCards(videos.slice(0, 30), listContainer, false);
                console.log(`[DEBUG] Caricati ${videos.length} video via RSS`);
            } catch (e) {
                console.error(e);
                listContainer.innerHTML = '<p>Errore caricamento RSS.</p>';
            }
        }

        // ... il resto del tuo script (appendVideoCards, launchVideo, ecc.) rimane uguale ...

        window.onload = function() {
            loadApiKey();
            renderAppChannels();
        };
    </script>
</body>
</html>
