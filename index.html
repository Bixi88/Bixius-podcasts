<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bixius's Choice Podcasts</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">

    <link rel="manifest" href="./manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=YouTube+Sans:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        :root {
            --bg-main: #0f0f0f;
            --bg-surface: #212121;
            --bg-surface-hover: #272727;
            --text-main: #ffffff;
            --text-secondary: #aaaaaa;
            --yt-red: #ff0000;
            --twitch-purple: #9146ff;
            --font-yt: 'YouTube Sans', 'Roboto', sans-serif;
            --font-main: 'Roboto', sans-serif;
            --radius-player: 16px;
            --radius-card: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        .top-bar {
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background-color: var(--bg-main);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .brand { display: flex; align-items: center; gap: 8px; }
        .brand .play-logo { color: var(--yt-red); font-size: 28px; }
        .brand h1 { font-family: var(--font-yt); font-size: 20px; font-weight: 700; }

        .container { max-width: 680px; margin: 0 auto; padding: 0 16px; }

        .view-panel { display: none; }
        .view-panel.active { display: block; }

        .player-section {
            margin-bottom: 24px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.7);
            border-radius: var(--radius-player);
            overflow: hidden;
            background-color: var(--bg-surface);
        }
        .player-wrapper { width: 100%; aspect-ratio: 16 / 9; background: #000; position: relative; }
        .player-wrapper iframe { width: 100%; height: 100%; border: none; }

        .no-video-placeholder {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: var(--text-secondary); gap: 12px;
        }

        .section-title { font-size: 16px; font-weight: 500; margin: 20px 4px 12px; }
        .channels-slider { display: flex; gap: 16px; overflow-x: auto; padding: 6px 4px 16px; }
        .channels-slider::-webkit-scrollbar { display: none; }

        .channel-item {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            cursor: pointer; flex-shrink: 0;
        }
        .avatar-circle {
            width: 72px; height: 72px; border-radius: 50%; padding: 3px;
            display: flex; align-items: center; justify-content: center;
        }
        .avatar-placeholder {
            width: 100%; height: 100%; border-radius: 50%; background: #333;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: 700;
        }

        .video-list { display: flex; flex-direction: column; gap: 12px; }
        .video-card {
            display: flex; gap: 12px; padding: 14px; background: var(--bg-surface);
            border-radius: var(--radius-card); cursor: pointer;
        }

        .settings-card {
            background-color: var(--bg-surface);
            padding: 20px;
            border-radius: var(--radius-player);
            margin-top: 16px;
        }
        .form-control {
            width: 100%; background: #161616; border: 1px solid #333; color: #fff;
            padding: 10px 12px; border-radius: 6px; font-size: 14px;
        }
        .btn {
            padding: 11px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer;
        }
        .btn-primary { background: var(--yt-red); color: white; }
        .btn-secondary { background: #333; color: white; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">
            <i class="material-icons-round play-logo">play_circle_filled</i>
            <h1>Bixius's Choice Podcasts</h1>
        </div>
        <button class="icon-btn" onclick="toggleView()">
            <i class="material-icons-round" id="viewIcon">settings</i>
        </button>
    </div>

    <div id="homePanel" class="container view-panel active">
        <div class="player-section">
            <div class="player-wrapper" id="playerWrapper">
                <div class="no-video-placeholder">
                    <i class="material-icons-round">play_arrow</i>
                    <p>Scegli un canale, poi clicca su un contenuto in basso</p>
                </div>
            </div>
        </div>

        <h2 class="section-title" id="lastWatchedTitle" style="display:none;">Ultimo video visto</h2>
        <div class="video-list" id="lastWatchedContainer"></div>

        <h2 class="section-title">I tuoi canali</h2>
        <div class="channels-slider" id="channelsSlider"></div>

        <h2 class="section-title" id="currentChannelTitle" style="display:none;">Ultimi video pubblicati</h2>
        <div class="video-list" id="videoList"></div>
    </div>

    <div id="settingsPanel" class="container view-panel">
        <div class="settings-card">
            <h2 style="margin-bottom:16px;">Gestione Canali</h2>
            <div class="form-group">
                <label>Nome del Canale</label>
                <input type="text" id="inputName" class="form-control" placeholder="Es. Pregianza">
            </div>
            <div class="form-group">
                <label>Piattaforma</label>
                <select id="inputPlatform" class="form-control">
                    <option value="youtube_channel">YouTube</option>
                    <option value="youtube_video">YouTube (Video/Playlist)</option>
                    <option value="twitch">Twitch</option>
                </select>
            </div>
            <div class="form-group">
                <label>URL, @handle o Channel ID</label>
                <input type="text" id="inputId" class="form-control" placeholder="https://youtube.com/@IlPregianza">
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-secondary" onclick="toggleView()">Chiudi</button>
                <button class="btn btn-primary" onclick="addChannel()">Aggiungi Canale</button>
            </div>
        </div>
    </div>

    <script>
        let channels = JSON.parse(localStorage.getItem('bixius_user_channels')) || [];
        let lastWatched = JSON.parse(localStorage.getItem('bixius_last_watched')) || null;

        function renderAppChannels() {
            const slider = document.getElementById('channelsSlider');
            slider.innerHTML = channels.length === 0 ? 
                `<p style="color:var(--text-secondary); padding:10px;">Nessun canale configurato.</p>` : '';

            channels.forEach(chan => {
                const item = document.createElement('div');
                item.className = `channel-item`;
                item.onclick = () => selectChannel(chan.id);
                item.innerHTML = `
                    <div class="avatar-circle"><div class="avatar-placeholder">${chan.name[0].toUpperCase()}</div></div>
                    <span>${chan.name}</span>
                `;
                slider.appendChild(item);
            });
        }

        function cleanInputId(input) {
            let val = input.trim();
            if (val.includes('/@')) val = '@' + val.split('/@')[1].split('/')[0];
            if (val.includes('/channel/')) val = val.split('/channel/')[1].split('/')[0];
            return val;
        }

        async function addChannel() {
            const name = document.getElementById('inputName').value.trim();
            const platform = document.getElementById('inputPlatform').value;
            let rawId = document.getElementById('inputId').value.trim();

            if (!name || !rawId) return alert("Inserisci nome e ID/URL");

            const sourceId = cleanInputId(rawId);
            const newId = Date.now().toString(36);

            channels.push({ id: newId, name, platform, sourceId });
            localStorage.setItem('bixius_user_channels', JSON.stringify(channels));
            
            document.getElementById('inputName').value = '';
            document.getElementById('inputId').value = '';
            renderAppChannels();
            toggleView();
        }

        async function selectChannel(id) {
            const channel = channels.find(c => c.id === id);
            document.getElementById('currentChannelTitle').style.display = 'block';
            document.getElementById('currentChannelTitle').innerText = `Ultimi da ${channel.name}`;

            const list = document.getElementById('videoList');
            list.innerHTML = '<p style="padding:30px; text-align:center; color:#888;">Caricamento...</p>';

            // Qui andrebbe la logica completa di fetch RSS (per ora semplificata)
            list.innerHTML = `<p style="padding:20px; color:#888;">Canale: ${channel.sourceId}<br><small>Feed in fase di sviluppo</small></p>`;
        }

        function toggleView() {
            const home = document.getElementById('homePanel');
            const settings = document.getElementById('settingsPanel');
            const icon = document.getElementById('viewIcon');

            if (home.classList.contains('active')) {
                home.classList.remove('active');
                settings.classList.add('active');
                icon.textContent = 'close';
            } else {
                settings.classList.remove('active');
                home.classList.add('active');
                icon.textContent = 'settings';
            }
        }

        window.onload = renderAppChannels;
    </script>
</body>
</html>
